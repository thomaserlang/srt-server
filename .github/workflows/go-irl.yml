name: Build and push go-irl

on:
  workflow_dispatch:
  schedule:
    - cron: "31 3 * * *"

env:
  IMAGE: ghcr.io/thomaserlang/go-irl

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: e04/go-irl
          ref: main
          path: upstream

      - name: Prepare tags
        id: tags
        working-directory: upstream
        run: |
          echo "date_tag=v$(date -u +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check published image
        id: published
        run: |
          if docker buildx imagetools inspect "${IMAGE}:latest" \
            --format '{{ index .Image.Config.Labels "org.opencontainers.image.revision" }}' > published-sha.txt 2>/dev/null; then
            echo "sha=$(cat published-sha.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip unchanged upstream
        if: steps.published.outputs.sha == steps.tags.outputs.sha
        run: |
          echo "Upstream is unchanged at ${{ steps.tags.outputs.sha }}; skipping build."

      - name: Set up Docker Buildx
        if: steps.published.outputs.sha != steps.tags.outputs.sha
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.published.outputs.sha != steps.tags.outputs.sha
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.published.outputs.sha != steps.tags.outputs.sha
        uses: docker/build-push-action@v7
        with:
          context: upstream
          file: Dockerfile.go-irl
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tags.outputs.date_tag }}
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/e04/go-irl
            org.opencontainers.image.revision=${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
